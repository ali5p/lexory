services:
  lexory:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv  # preserve venv from build (host mount would overwrite)
    environment:
      GENERATOR_MODE: ${GENERATOR_MODE:-llm}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b-instruct}
      HF_TOKEN: ${HF_TOKEN:-}
      # Use service hostnames here — not localhost. A host .env with
      # QDRANT_URL=http://localhost:6333 would break Lexory-in-Docker (localhost = this container).
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434/api/generate
      LANGUAGETOOL_URL: http://languagetool:8010
      # Explicit URL so host .env (localhost) does not win over mounted .env in the container.
      DATABASE_URL: postgresql+asyncpg://lexory:lexory@postgres:5432/lexory
      POSTGRES_HOST: postgres
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      languagetool:
        condition: service_started

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    # TCP check (no curl/wget required in image); aligns with HTTP readiness on 6333.
    healthcheck:
      test: ["CMD-SHELL", "timeout 2s bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lexory
      POSTGRES_PASSWORD: lexory
      POSTGRES_DB: lexory
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexory"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  languagetool:
    image: erikvl87/languagetool:6.7
    ports:
      - "8010:8010"

volumes:
  pgdata:
